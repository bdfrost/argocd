name: synology-csi
puid: 1026
pgid: 100
synology-csi:
  clientInfoSecret:
    create: false
    name: synology-csi
  storageClasses:
    iscsi-delete:
      disabled: false
      isDefault: true
      parameters:
       csi.storage.k8s.io/fstype: btrfs
       location: /volume4 
       protocol: iscsi 
      reclaimPolicy: Delete
    iscsi-retain:
      reclaimPolicy: Retain
      disabled: false
      isDefault: false
      parameters:
       csi.storage.k8s.io/fstype: btrfs  
       location: /volume4 
       protocol: iscsi 
    nfs-delete:
      mountOptions:
        - vers=4.1
      parameters:
        protocol: nfs
      reclaimPolicy: Delete
      test: true
    nfs-retain:
      mountOptions:
        - vers=4.1
      parameters:
        protocol: nfs
      reclaimPolicy: Retain
    smb-delete:
      disabled: true
    smb-retain:
      disabled: true
  volumeSnapshotClasses:
    delete:
      ## One of true or false (default):
      #disabled: false
      # One of "Retain" or "Delete" (default):
      deletionPolicy: Delete
      disabled: false
      ## One of true or false (default):
      #isDefault: false
      ## Note that these parameters cannot get updated once deployed - any subsequent changes get ignored!
      #parameters:
      #  description: Kubernetes CSI
      #  is_locked: "false"
    retain:
      deletionPolicy: Retain
      disabled: false