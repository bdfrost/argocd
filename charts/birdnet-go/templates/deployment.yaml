apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
spec:
  strategy:
    type: Recreate
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.name }}
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
      - name: setup-home
        image: docker.io/library/alpine:3.20
        command: ["sh", "-c", "mkdir -p /home/birdnet/.config && chown -R 1000:1000 /home/birdnet"]
        volumeMounts:
        - name: home-birdnet
          mountPath: /home/birdnet
      - name: init-config
        image: docker.io/library/alpine:3.20
        command: ["sh", "-c", "if [ ! -f /config/config.yaml ]; then cp /config-secret/config.yaml /config/config.yaml && chown 1000:1000 /config/config.yaml; fi"]
        volumeMounts:
        - name: config
          mountPath: /config
        - name: config-secret
          mountPath: /config-secret
      containers:
      - name: {{ .Values.name }}
        image: {{ .Values.image }}
        imagePullPolicy: Always
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
        ports:
        - containerPort: {{ .Values.targetPort }}
          name: http
        env:
        - name: TZ
          value: "{{ .Values.timezone }}"
        - name: HOME
          value: "/data"
        - name: BIRDNET_STARTUP_FAIL_DELAY
          value: "30"
        - name: SKIP_CHOWN
          value: "true"
        {{- if .Values.resources }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        {{- end }}
        volumeMounts:
        - name: config
          mountPath: /config
        - name: data
          mountPath: /data
        - name: hls
          mountPath: /config/hls
        - name: home-birdnet
          mountPath: /home/birdnet
        livenessProbe:
          httpGet:
            path: /api/v2/health
            port: {{ .Values.targetPort }}
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /api/v2/health
            port: {{ .Values.targetPort }}
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: {{ .Values.name }}-config-pvc-synology
      - name: data
        persistentVolumeClaim:
          claimName: {{ .Values.name }}-data-pvc-synology
      - name: hls
        emptyDir:
          medium: Memory
          sizeLimit: 50Mi
      - name: config-secret
        secret:
          secretName: birdnet-go-config
      - name: home-birdnet
        emptyDir: {}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.name }}-config-pvc-synology
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: synology-csi-iscsi-delete
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.name }}-data-pvc-synology
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: synology-csi-iscsi-delete
  resources:
    requests:
      storage: 10Gi
