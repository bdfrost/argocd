# SealedSecrets for simplefin namespace
# These are encrypted with your cluster's Sealed Secrets controller public key.
# Safe to commit to git.
#
# To regenerate these after a credential change, run:
#
#   kubectl create secret generic simplefin-secret \
#     --namespace simplefin \
#     --from-literal=access-url='https://user:pass@beta-bridge.simplefin.org/simplefin' \
#     --dry-run=client -o yaml | \
#     kubeseal --namespace simplefin \
#              --controller-name sealed-secrets-controller \
#              --controller-namespace kube-system \
#              -o yaml
#
#   kubectl create secret generic simplefin-basic-auth \
#     --namespace simplefin \
#     --from-file=auth \
#     --dry-run=client -o yaml | \
#     kubeseal --namespace simplefin \
#              --controller-name sealed-secrets-controller \
#              --controller-namespace kube-system \
#              -o yaml
#
# Paste the output of each command below, replacing the placeholder blocks.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: simplefin-secret
  namespace: simplefin
spec:
  encryptedData:
    access-url: 
  template:
    metadata:
      name: simplefin-secret
      namespace: simplefin
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: simplefin-basic-auth
  namespace: simplefin
spec:
  encryptedData:
    auth: 
  template:
    metadata:
      name: simplefin-basic-auth
      namespace: simplefin
