apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "honcho.name" . }}-config
  labels:
{{ include "honcho.labels" . | nindent 4 }}
data:
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  NAMESPACE: {{ .Values.config.namespace | quote }}
  DB_CONNECTION_URI: {{ include "honcho.dbUri" . | quote }}
  CACHE_ENABLED: {{ .Values.config.cache.enabled | quote }}
  CACHE_URL: "redis://{{ include "honcho.name" . }}-redis:6379/0?suppress=true"
  AUTH_USE_AUTH: {{ .Values.config.auth.useAuth | quote }}
  DERIVER_WORKERS: {{ .Values.config.deriver.workers | quote }}
  {{- if .Values.config.llm.openaiBaseUrl }}
  LLM_OPENAI_BASE_URL: {{ .Values.config.llm.openaiBaseUrl | quote }}
  {{- end }}
