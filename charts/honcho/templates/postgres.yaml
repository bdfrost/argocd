apiVersion: v1
kind: Secret
metadata:
  name: {{ include "honcho.name" . }}-postgres
  labels:
{{ include "honcho.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_DB: {{ .Values.config.database.name | quote }}
  POSTGRES_USER: {{ .Values.config.database.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.config.database.password | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "honcho.name" . }}-postgres-init
  labels:
{{ include "honcho.labels" . | nindent 4 }}
data:
  init.sql: |
    CREATE EXTENSION IF NOT EXISTS vector;
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "honcho.name" . }}-postgres
  labels:
{{ include "honcho.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  serviceName: {{ include "honcho.name" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "honcho.name" . }}
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "honcho.name" . }}
        app.kubernetes.io/component: postgres
    spec:
      containers:
      - name: postgres
        image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
        imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
        args: ["postgres", "-c", "max_connections=200"]
        ports:
        - name: postgres
          containerPort: 5432
        envFrom:
        - secretRef:
            name: {{ include "honcho.name" . }}-postgres
        env:
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        - name: init
          mountPath: /docker-entrypoint-initdb.d
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "{{ .Values.config.database.user }}", "-d", "{{ .Values.config.database.name }}"]
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          exec:
            command: ["pg_isready", "-U", "{{ .Values.config.database.user }}", "-d", "{{ .Values.config.database.name }}"]
          initialDelaySeconds: 30
          periodSeconds: 30
        resources: {{ toYaml .Values.postgres.resources | nindent 10 }}
      volumes:
      - name: init
        configMap:
          name: {{ include "honcho.name" . }}-postgres-init
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: {{ .Values.postgres.storage.className | quote }}
      resources:
        requests:
          storage: {{ .Values.postgres.storage.size | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "honcho.name" . }}-postgres
  labels:
{{ include "honcho.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "honcho.name" . }}
    app.kubernetes.io/component: postgres
  ports:
  - name: postgres
    port: 5432
    targetPort: postgres
