apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "honcho.name" . }}-api
  labels:
{{ include "honcho.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "honcho.name" . }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "honcho.name" . }}
        app.kubernetes.io/component: api
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      initContainers:
      - name: wait-for-postgres
        image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
        command: ["sh", "-c", "until pg_isready -h {{ include "honcho.name" . }}-postgres -U {{ .Values.config.database.user }} -d {{ .Values.config.database.name }}; do sleep 2; done"]
      containers:
      - name: api
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["sh", "docker/entrypoint.sh"]
        ports:
        - name: http
          containerPort: {{ .Values.service.targetPort }}
        envFrom:
        - configMapRef:
            name: {{ include "honcho.name" . }}-config
        - secretRef:
            name: {{ .Values.existingSecret }}
            optional: true
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 60
          periodSeconds: 30
        resources: {{ toYaml .Values.resources.api | nindent 10 }}
