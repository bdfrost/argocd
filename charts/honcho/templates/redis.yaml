apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "honcho.name" . }}-redis
  labels:
{{ include "honcho.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  serviceName: {{ include "honcho.name" . }}-redis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "honcho.name" . }}
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "honcho.name" . }}
        app.kubernetes.io/component: redis
    spec:
      containers:
      - name: redis
        image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
        imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
        ports:
        - name: redis
          containerPort: 6379
        volumeMounts:
        - name: data
          mountPath: /data
        readinessProbe:
          exec:
            command: ["redis-cli", "ping"]
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          exec:
            command: ["redis-cli", "ping"]
          initialDelaySeconds: 30
          periodSeconds: 30
        resources: {{ toYaml .Values.redis.resources | nindent 10 }}
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: {{ .Values.redis.storage.className | quote }}
      resources:
        requests:
          storage: {{ .Values.redis.storage.size | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "honcho.name" . }}-redis
  labels:
{{ include "honcho.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "honcho.name" . }}
    app.kubernetes.io/component: redis
  ports:
  - name: redis
    port: 6379
    targetPort: redis
