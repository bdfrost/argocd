# SealedSecret for the webhook notification URL
#
# WORKFLOW:
# 1. Set secret.notificationURL in values.yaml to your webhook URL
#
# 2. Render the chart to generate the plain Secret:
#    helm template instagram-monitor . -n instagram-monitor -f values.yaml #      | kubectl apply --dry-run=client -n instagram-monitor -f -
#
# 3. Encrypt the Secret with kubeseal:
#    kubectl get secret instagram-monitor-secrets -n instagram-monitor -o yaml \
#      | kubeseal --controller-namespace kube-system --controller-name sealed-secrets \
#        -o yaml > charts/instagram-monitor/sealedsecret.yaml
#
# 4. Replace the encryptedData section below with the output from kubeseal
#
# 5. Remove secret.notificationURL from values.yaml and commit sealedsecret.yaml
#    The SealedSecret controller will decrypt it into a regular Secret at runtime
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: instagram-monitor-secrets
  namespace: instagram-monitor
  annotations:
    sealedsecrets.bitnami.com/managed: "true"
spec:
  encryptedData:
    NOTIFICATION_URL: <replace-with-encrypted-value>
  template:
    metadata:
      name: instagram-monitor-secrets
      namespace: instagram-monitor
    type: Opaque
