external-dns:
  image:
    repository: registry.k8s.io/external-dns/external-dns
    tag:  ""
  pullPolicy: IfNotPresent  # @schema enum:[IfNotPresent, Always]
  provider: pihole
  env:
    - name: EXTERNAL_DNS_PIHOLE_SERVER
      value: http://dns2.brainboy.local.lan:8089
    - name: EXTERNAL_DNS_PIHOLE_PASSWORD
      valueFrom:
        secretKeyRef:
          name: pihole-password
          key: EXTERNAL_DNS_PIHOLE_PASSWORD
  domainFilters:
    - frost.haus
  policy: upsert-only
  sources:
    - ingress
    - service
  resources:
    limits:
      memory: 50Mi
    requests:
      memory: 50Mi
      cpu: 10m
  ## ensure RBAC is enabled
  rbac:
    create: true
    apiVersion: v1
  logLevel: debug
